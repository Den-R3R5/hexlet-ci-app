name: test-and-lint

on: push

env:
  CI: true

jobs:
  build: 
    runs-on: ubuntu-latest

    steps:
      - name: build
        uses: actions/checkout@v4
        
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  
      - name: setup
        run: make setup

      - name: run tests
        run: make test

      - name: run lint
        run: make lint 
      - name: Hello, World!
        uses: hexlet-components/hello-from-hexlet-action@release