name: test-and-lint

on: push

jobs:
  build: 
    runs-on: ubuntu-latest

    steps:
      - name: build
        uses: actions/checkout@v4
        
      - name: setup node
        uses: actions/setup-node@v4

      - name: setup
        run: make setup

      - name: run tests
        run: make test

      - name: run lint
        run: make lint 